<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fifty Taste</title>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>

  <header class="hero">
    <h1>Fifty Taste</h1>
    <p>Delicious shawarma, drinks & snacks in Abuja</p>
    <button onclick="scrollToMenu()">Order Now</button>
  </header>

  <section id="menu" class="menu">
    <h2>Menu</h2>

    <div class="card">
      <h3>Medium Shawarma</h3>
      <p>₦5,000</p>
      <button onclick="addToCart('Medium Shawarma', 5000)">Add to Cart</button>
    </div>

    <div class="card">
      <h3>Small Shawarma</h3>
      <p>₦3,500</p>
      <button onclick="addToCart('Small Shawarma', 3500)">Add to Cart</button>
    </div>

    <div class="card">
      <h3>Hibiscus Drink</h3>
      <p>₦2,000</p>
      <button onclick="addToCart('Hibiscus Drink', 2000)">Add to Cart</button>
    </div>
  </section>

  <section class="cart-section">
    <h2>Your Cart</h2>
    <ul id="cartItems"></ul>
    <h3>Total: ₦<span id="total">0</span></h3>
  </section>

  <section class="checkout">
    <h2>Checkout</h2>

    <input type="text" id="name" placeholder="Your Name"/>
    <input type="text" id="phone" placeholder="Phone Number"/>
    <input type="text" id="address" placeholder="Delivery Address"/>

    <button onclick="placeOrder()">Place Order</button>
  </section>

  <script src="app.js"></script>
</body>
</html>
